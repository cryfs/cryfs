name: CI

permissions:
  contents: read
  pull-requests: write

on:
  - push
  - pull_request

# Cancel in-progress runs on the same ref when a new commit is pushed,
# so a fix-up push doesn't have to wait behind the superseded run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15
          - macos-15-intel
          - macos-26
          - ubuntu-22.04
          - ubuntu-24.04
        command: ["test"]
        profile: ["", "--release"]
        # TODO Add --all-features (but that takes too long). Maybe instead add --all-features for some crates, but use separate jobs for the different slow-test-features of blockstore.
        features: ["", "--no-default-features"]
        toolchain: ["stable", "nightly", "1.95"]
    runs-on: ${{matrix.os}}
    # Temporary diagnostic cap so macOS jobs fail (and upload their log
    # artifact) well before the 6h job-level limit. Remove once the macOS
    # hang is understood.
    timeout-minutes: 75
    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ runner.os == 'Linux' }}
        uses: jlumbroso/free-disk-space@v1.3.1
      - uses: actions/checkout@v6
      - name: Install Dependencies (Linux)
        if: ${{ runner.os == 'Linux' }}
        # TODO We may be able to remove libfuse3-dev here because rust fuser doesn't use libfuse anymore (on Linux at least)
        run: sudo apt-get install -y fuse3 libfuse3-dev
      - name: Install Dependencies (MacOS)
        if: ${{ runner.os == 'macOS' }}
        run: brew install pkg-config macfuse
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ matrix.toolchain }}
      - name: cargo ${{ matrix.command }}
        shell: bash
        # --no-fail-fast: keep running other tests after one fails so the log
        # captures the full failure surface.
        # --nocapture: stream each test's stdout/stderr to the log so a hang
        # leaves the last-running test name visible in cargo-output.log.
        env:
          RUST_BACKTRACE: "1"
        run: |
          set -o pipefail
          cargo ${{ matrix.command }} ${{ matrix.features }} ${{ matrix.profile }} \
              --no-fail-fast -- --nocapture 2>&1 | tee cargo-output.log
      - name: Upload cargo output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-output-${{ matrix.os }}-${{ matrix.toolchain }}-${{ matrix.command }}${{ matrix.features }}${{ matrix.profile }}
          path: cargo-output.log
          if-no-files-found: ignore
      - name: Post cargo tail to PR on failure
        if: failure() && github.event_name == 'pull_request' && matrix.os == 'ubuntu-22.04' && matrix.features == '' && matrix.profile == ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s cargo-output.log ]; then
            {
              echo "### CI failure: \`${{ matrix.os }}\` toolchain=\`${{ matrix.toolchain }}\` features=\`(default)\` profile=\`debug\`"
              echo ""
              echo "Last 250 lines of cargo output:"
              echo ""
              echo '```'
              tail -n 250 cargo-output.log
              echo '```'
            } > /tmp/comment.md
            gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md --repo ${{ github.repository }}
          fi
  crates_individually_testable:
    # This job tests that each crate can be built and tested individually.
    # We don't actually run any tests because those are being run as part of other CI jobs already.
    name: check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: ["blobstore", "blockstore", "check", "cli-utils", "concurrent-store", "cryfs-config", "cryfs-cli", "cryfs-filesystem", "cryfs-runner", "cryfs-version", "crypto", "e2e-perf-tests", "fsblobstore", "rustfs", "tempproject", "utils"]
        targets: ["", "--tests", "--examples", "--benches"]
        features: ["", "--no-default-features", "--all-features"]
        # TODO Re-add at least some release-profile coverage for this job.
        # The full profile axis (debug vs release) was 16 × 4 × 3 × 2 = 384
        # configurations, which exceeds GitHub Actions' 256-configuration
        # matrix cap and caused the entire job to fail at matrix-resolution
        # time. Either find a way to fit release back in (split into a
        # second job, drop a less-valuable axis, exclude some
        # crate/target/feature combinations) or accept debug-only here.
    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ runner.os == 'Linux' }}
        uses: jlumbroso/free-disk-space@v1.3.1
      - uses: actions/checkout@v6
      - name: Install Dependencies
        run: sudo apt-get install -y fuse3 libfuse3-dev
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - name: cargo check
        working-directory: ./crates/${{ matrix.crate }}
        run: cargo check ${{ matrix.features }} ${{matrix.targets}}
  # clippy_check:
  #   name: Linter (clippy)
  #   runs-on: ubuntu-latest
  #   permissions:
  #     checks: write
  #   steps:
  #     - uses: actions/checkout@v6
  #     - name: Install Dependencies
  #       run: sudo apt-get install -y fuse3 libfuse3-dev
  #     - uses: actions-rs/toolchain@v1
  #       with:
  #         toolchain: stable
  #         components: clippy
  #         default: true
  #     - uses: actions-rs/clippy-check@v1
  #       with:
  #         token: ${{ secrets.GITHUB_TOKEN }}
  #         args: --all-features --all-targets -- -D warnings
  code_format:
    name: Code Formatter (rustfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          components: rustfmt
      - uses: mbrobbel/rustfmt-check@0.5.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
  # sync_readme:
  #   name: Sync README.md (cargo sync-readme)
  #   runs-on: ubuntu-latest
  #   steps:
  #   - uses: actions/checkout@v6
  #   - run: cargo install cargo-rdme
  #   - run: ./gen_readme.sh
  #   # Fail job if gen_readme.sh introduced changes. If this fails, then we need to run gen_readme.sh locally and add it to the commit.
  #   - run: git diff --exit-code
  dead_doc_links:
    name: Find dead doc links
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install Dependencies
      run: sudo apt-get install -y fuse3 libfuse3-dev
    - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
      with:
        toolchain: stable
    - run: RUSTDOCFLAGS="-Dwarnings" cargo doc
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ runner.os == 'Linux' }}
        uses: jlumbroso/free-disk-space@v1.3.1
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      # Setup inspired by instructions at https://github.com/taiki-e/cargo-llvm-cov/blob/9b93f70f4c5a06d6ee221d3537067bc8d3f5b7c6/README.md
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate code coverage
        shell: bash
        # Don't pass --all-features. The cryfs-e2e-perf-tests crate's
        # `benchmark` feature switches its perf_test_macro to a
        # criterion-benchmark form that doesn't compile under
        # `cargo build --tests` (which is what llvm-cov drives), only
        # under `cargo bench`. With --all-features the coverage job
        # fails to compile e2e-perf-tests; without it, every crate
        # uses its default features and llvm-cov can finish.
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info 2>&1 | tee coverage-output.log
      - name: Upload coverage output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-output
          path: coverage-output.log
          if-no-files-found: ignore
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}  # not required for public repos, but leaving it here because it seems we run into rate limit issues on Codecov's API without it.
          files: lcov.info
          fail_ci_if_error: true
          verbose: true